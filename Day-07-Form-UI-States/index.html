<section class="join-community">
    <h2>Join The Engineering Community</h2>
    <p>Standard, not a trend. Build with us.</p>

    <form class="membership-form" action="#" method="POST">
        
        <div class="form-group">
            <label for="fullName">Full Name <span class="required">*</span></label>
            <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>
        </div>

        <div class="form-group">
            <label for="emailAddress">Student Email <span class="required">*</span></label>
            <input type="email" id="emailAddress" name="emailAddress" placeholder="jane@student.edu" required>
        </div>

        <div class="form-group">
            <label for="motivation">Why do you want to join?</label>
            <textarea id="motivation" name="motivation" rows="4" placeholder="I want to solve actual problems..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Application</button>
        
        </form>
</section>
